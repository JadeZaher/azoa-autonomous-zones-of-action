services:
  postgres:
    image: postgres:16-alpine
    container_name: oasis-postgres
    environment:
      POSTGRES_DB: oasis
      POSTGRES_USER: oasis
      POSTGRES_PASSWORD: oasis123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oasis -d oasis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
