# ─── AZOA Sleek — full-stack dev composition ───
#
# Brings up the entire stack so a new contributor can clone + run:
#
#   ./dev-up.sh        # or dev-up.ps1 on Windows
#
# Services:
#   - surrealdb       RocksDB-backed v3.1.4 instance (port 8000)
#   - azoa-api       .NET 8 WebAPI (port 5000) -- runs `surrealforge up`
#                     against `surrealdb` on first boot to apply schemas,
#                     then starts the WebAPI host.
#   - azoa-frontend  Next.js dev frontend (port 3000) wired to azoa-api
#
# Networking:
#   All three services share the default compose network; the API + frontend
#   reach SurrealDB via the `surrealdb` service name (not `localhost`).
#   The host's localhost:8000 / 5000 / 3000 forward into the containers so
#   you can hit the API directly from a tool like httpie or curl on the host.
#
# Persistence:
#   `surrealdb_data` named volume preserves data across container restarts.
#   Wipe it via `docker compose -f docker-compose.dev.yml down -v` when you
#   want a clean DB.
#
# Compose runtimes supported: docker compose v2, docker-compose v1, podman-compose.
# The companion ./dev-up.sh / ./dev-up.ps1 scripts auto-detect.
#
# G1 durability: RocksDB WAL syncs per commit. (surrealkv ships enabled on
# 3.x; rocksdb is kept here deliberately — see the surrealdb-major-upgrade
# DECISION.md. Switching engines is a separate follow-up.)

services:
  surrealdb:
    image: surrealdb/surrealdb:v3.1.4
    container_name: azoa-dev-surrealdb
    restart: unless-stopped
    # 3.x runs as the distroless `nonroot` user, which cannot create the
    # RocksDB dir inside a root-owned named-volume mount. Run the DB service
    # as root so /data is writable (the 1.5.x image did this implicitly).
    user: "0:0"
    command:
      - start
      - --log
      - info
      - --user
      - root
      - --pass
      - root
      - --bind
      - 0.0.0.0:8000
      - rocksdb:///data/db
    environment:
      SURREAL_SYNC_DATA: "true"
    ports:
      # SURREALDB_HOST_PORT lets a contributor pick a different host-side
      # port when something else is already bound to 8000 (e.g. their own
      # existing SurrealDB container). Defaults to 8000 to keep the
      # zero-config path working.
      - "${SURREALDB_HOST_PORT:-8000}:8000"
    volumes:
      - surrealdb_data:/data
    healthcheck:
      # Image is distroless -- use the bundled /surreal binary, not curl.
      # 3.x renamed the flag: is-ready takes --endpoint (was --conn on 1.5.x).
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - azoa-dev

  azoa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: azoa-dev-api
    restart: unless-stopped
    # When the bundled `surrealdb` service is part of the up set, wait for
    # it to be healthy. When dev-up.{sh,ps1} detects an external SurrealDB
    # on the host and brings up only `azoa-api azoa-frontend`, this
    # depends_on entry is ignored (compose only enforces dependencies for
    # services it actually starts).
    depends_on:
      surrealdb:
        condition: service_healthy
    # Resolves host.docker.internal on Linux Docker Engine (Desktop adds it
    # automatically; Engine does not) for the genuine external-SurrealDB
    # case where dev-up points SurrealDb__Endpoint at the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Connection URL is parameterised so the dev-up scripts can flip it
      # to `host.containers.internal` / `host.docker.internal` when an
      # external SurrealDB is detected on the host. Default points at the
      # bundled `surrealdb` service (compose-network DNS entry).
      #
      # The interpolation source variable is SURREALFORGE_URL (NOT
      # `SurrealDb__Endpoint`) because podman-compose's ${VAR:-default}
      # parser drops env-var names that contain double underscores --
      # so both .NET config keys (`SurrealDb__Endpoint`) AND the CLI's
      # `SURREALFORGE_URL` get the SAME value via SURREALFORGE_URL,
      # which is single-underscore-safe.
      SurrealDb__Endpoint: "${SURREALFORGE_URL:-http://surrealdb:8000}"
      SurrealDb__Namespace: "azoa"
      SurrealDb__Database: "azoa"
      SurrealDb__User: "root"
      SurrealDb__Password: "root"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:5000"
      # Mirror env-var aliases used by the surrealforge CLI so the on-boot
      # migration pre-step (entrypoint wrapper, see below) reaches the right
      # instance with no flags.
      SURREALFORGE_URL: "${SURREALFORGE_URL:-http://surrealdb:8000}"
      SURREALFORGE_NS: "azoa"
      SURREALFORGE_DB: "azoa"
      SURREALFORGE_USER: "root"
      SURREALFORGE_PASS: "root"
    ports:
      - "5000:5000"
    networks:
      - azoa-dev
    healthcheck:
      # AZOA exposes the ASP.NET health probe at /health (registered via
      # MapAzoaHealth in Observability/HealthCheckExtensions.cs). Frontend
      # depends on this so it doesn't boot before the API is serving.
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s

  azoa-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: azoa-dev-frontend
    restart: unless-stopped
    depends_on:
      azoa-api:
        condition: service_healthy
    environment:
      # The Next.js client makes its API calls to the host-exposed port
      # (`http://localhost:5000`) when running in the user's browser. The
      # frontend container itself doesn't talk to the API directly except
      # for SSR; we keep both pointing at the same host-mapped port for
      # consistency.
      # Runtime-resolved (H3): plain API_URL is read per-request by the Next.js
      # server layer, so repointing the UI needs only a restart, not a rebuild.
      # The former NEXT_PUBLIC_API_URL was baked at `next build` and is now dead.
      API_URL: "http://localhost:5000"
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    networks:
      - azoa-dev

volumes:
  surrealdb_data:
    driver: local

networks:
  azoa-dev:
    driver: bridge
