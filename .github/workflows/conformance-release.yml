name: Promote attested conformance image

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact current main commit proven by the CI run.
        required: true
        type: string
      ci_run_id:
        description: Successful CI run that produced the conformance-evidence artifact.
        required: true
        type: string
      surreal_mode:
        description: Preserve an already-pinned healthy database or explicitly promote the reviewed digest.
        required: true
        default: already-healthy
        type: choice
        options:
          - already-healthy
          - redeploy

concurrency:
  group: conformance-promotion
  cancel-in-progress: false

jobs:
  promote:
    name: Verify evidence and publish immutable image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: conformance-promotion
    outputs:
      api_image: ${{ steps.release_refs.outputs.api_image }}
      frontend_image: ${{ steps.release_refs.outputs.frontend_image }}
    permissions:
      actions: read
      contents: read
      packages: write
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - name: Check out requested source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 1

      - name: Verify source and producer run
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git fetch origin +refs/heads/main:refs/remotes/origin/main --depth=1
          test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
          run=$(gh run view "$CI_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --json conclusion,event,headBranch,headSha,status,workflowName)
          test "$(jq -r '.conclusion' <<< "$run")" = success
          test "$(jq -r '.status' <<< "$run")" = completed
          test "$(jq -r '.event' <<< "$run")" = push
          test "$(jq -r '.headBranch' <<< "$run")" = main
          test "$(jq -r '.headSha' <<< "$run")" = "$SOURCE_SHA"
          test "$(jq -r '.workflowName' <<< "$run")" = CI

      - name: Download and verify attested evidence
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set -euo pipefail
          artifact="azoa-node-conformance-$SOURCE_SHA"
          gh run download "$CI_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$artifact" --dir downloaded-evidence
          bundle=$(find downloaded-evidence -type f -name conformance-evidence.tar.gz -print -quit)
          test -n "$bundle"
          test "$(find downloaded-evidence -type f -name conformance-evidence.tar.gz | wc -l)" = 1
          test "$(stat --printf=%s "$bundle")" -le 2097152
          gh attestation verify "$bundle" -R "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --source-digest "$SOURCE_SHA" \
            --source-ref refs/heads/main \
            --deny-self-hosted-runners
          python3 - "$bundle" verified-evidence "$GITHUB_REPOSITORY" "$SOURCE_SHA" "$CI_RUN_ID" <<'PY'
          import hashlib
          import json
          import sys
          import tarfile
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          bundle, destination, repository, source_sha, ci_run_id = sys.argv[1:]
          expected_names = ["metadata.json", "G1.trx", "G2.trx", "G3.trx", "G5.trx", "G7.trx"]
          expected_workflow = f"{repository}/.github/workflows/ci.yml@refs/heads/main"
          member_limits = {"metadata.json": 65536, **{name: 524288 for name in expected_names[1:]}}
          destination_path = Path(destination)
          destination_path.mkdir(mode=0o700)
          payloads = {}
          with tarfile.open(bundle, "r:gz") as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              if (names != expected_names or any(not member.isfile() for member in members)
                      or any(member.size > member_limits[member.name] for member in members)
                      or sum(member.size for member in members) > 2097152):
                  raise SystemExit("Unexpected conformance archive members.")
              for member in members:
                  source = archive.extractfile(member)
                  if source is None:
                      raise SystemExit(f"Unreadable conformance archive member: {member.name}")
                  payload = source.read(member_limits[member.name] + 1)
                  if len(payload) > member_limits[member.name]:
                      raise SystemExit(f"Oversized conformance archive member: {member.name}")
                  payloads[member.name] = payload

          metadata = json.loads(payloads["metadata.json"])
          required_keys = {"schema", "repository", "commit", "workflow", "runId", "generatedAt", "expiresAt", "files"}
          if set(metadata) != required_keys:
              raise SystemExit("Unexpected conformance metadata shape.")
          if (metadata["schema"] != "azoa-node-conformance-evidence/v1"
                  or metadata["repository"] != repository
                  or metadata["commit"] != source_sha
                  or metadata["workflow"] != expected_workflow
                  or metadata["runId"] != ci_run_id):
              raise SystemExit("Conformance metadata identity mismatch.")
          parse_time = lambda value: datetime.fromisoformat(value.replace("Z", "+00:00"))
          generated_at, expires_at = parse_time(metadata["generatedAt"]), parse_time(metadata["expiresAt"])
          now = datetime.now(timezone.utc)
          if generated_at.tzinfo is None or expires_at.tzinfo is None or generated_at > now or expires_at <= now or expires_at > generated_at + timedelta(hours=24):
              raise SystemExit("Conformance metadata freshness mismatch.")
          file_entries = metadata["files"]
          if not isinstance(file_entries, list) or [entry.get("name") for entry in file_entries] != expected_names[1:]:
              raise SystemExit("Conformance metadata file list mismatch.")
          for entry in file_entries:
              if set(entry) != {"name", "sha256"} or entry["name"] not in payloads:
                  raise SystemExit("Conformance metadata file entry mismatch.")
              if hashlib.sha256(payloads[entry["name"]]).hexdigest() != entry["sha256"]:
                  raise SystemExit(f"Conformance hash mismatch: {entry['name']}")
          for name in expected_names:
              (destination_path / name).write_bytes(payloads[name])
          PY

      - name: Derive image names
        id: image
        run: |
          echo "api=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${GITHUB_REPOSITORY,,}-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish verified API image
        id: push-api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile.conformance-release
          push: true
          build-args: SOURCE_REVISION=${{ inputs.source_sha }}
          tags: ${{ steps.image.outputs.api }}:${{ inputs.source_sha }}

      - name: Attest API release image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.api }}
          subject-digest: ${{ steps.push-api.outputs.digest }}
          push-to-registry: true

      - name: Build and publish verified frontend image
        id: push-frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.frontend }}:${{ inputs.source_sha }}

      - name: Attest frontend release image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.frontend }}
          subject-digest: ${{ steps.push-frontend.outputs.digest }}
          push-to-registry: true

      - name: Materialize immutable Railway blueprint
        env:
          API_IMAGE_NAME: ${{ steps.image.outputs.api }}
          API_IMAGE_DIGEST: ${{ steps.push-api.outputs.digest }}
          FRONTEND_IMAGE_NAME: ${{ steps.image.outputs.frontend }}
          FRONTEND_IMAGE_DIGEST: ${{ steps.push-frontend.outputs.digest }}
          RELEASE_TEMPLATE: ${{ runner.temp }}/azoa-railway-template-${{ inputs.source_sha }}.json
        run: |
          python3 deploy/railway/render-template.py \
            --api-image "$API_IMAGE_NAME@$API_IMAGE_DIGEST" \
            --frontend-image "$FRONTEND_IMAGE_NAME@$FRONTEND_IMAGE_DIGEST" \
            --output "$RELEASE_TEMPLATE"

      - name: Upload immutable Railway blueprint
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: azoa-railway-template-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/azoa-railway-template-${{ inputs.source_sha }}.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish immutable deployment references
        id: release_refs
        env:
          API_IMAGE_NAME: ${{ steps.image.outputs.api }}
          API_IMAGE_DIGEST: ${{ steps.push-api.outputs.digest }}
          FRONTEND_IMAGE_NAME: ${{ steps.image.outputs.frontend }}
          FRONTEND_IMAGE_DIGEST: ${{ steps.push-frontend.outputs.digest }}
        run: |
          echo "api_image=$API_IMAGE_NAME@$API_IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE_NAME@$FRONTEND_IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
          {
            echo "## Verified AZOA release images"
            echo
            echo "Deploy API and schema job only from \`$API_IMAGE_NAME@$API_IMAGE_DIGEST\`."
            echo
            echo "Deploy frontend only from \`$FRONTEND_IMAGE_NAME@$FRONTEND_IMAGE_DIGEST\`."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Promote immutable images to Railway
    needs: promote
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: railway-production
    permissions:
      contents: read
    steps:
      - name: Check out verified release tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 1

      - name: Install pinned Railway CLI
        run: npm install --global @railway/cli@5.27.0

      - name: Run serial immutable-image rollout
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          SURREAL_SERVICE_ID: ${{ vars.RAILWAY_SURREAL_SERVICE_ID }}
          SCHEMA_SERVICE_ID: ${{ vars.RAILWAY_SCHEMA_SERVICE_ID }}
          API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
          FRONTEND_SERVICE_ID: ${{ vars.RAILWAY_FRONTEND_SERVICE_ID }}
          API_HEALTH_URL: ${{ vars.RAILWAY_API_HEALTH_URL }}
          FRONTEND_HEALTH_URL: ${{ vars.RAILWAY_FRONTEND_HEALTH_URL }}
          SURREAL_MODE: ${{ inputs.surreal_mode }}
          API_IMAGE: ${{ needs.promote.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.promote.outputs.frontend_image }}
          SURREAL_IMAGE: docker.io/surrealdb/surrealdb@sha256:5757ed157c13b539bdc23a798ba2db1ffba6026deb3d15513058bffc77754a60
        run: |
          set -euo pipefail
          python3 deploy/railway/serial-rollout.py \
            --project-id "$PROJECT_ID" \
            --environment-id "$ENVIRONMENT_ID" \
            --surreal-service-id "$SURREAL_SERVICE_ID" \
            --schema-service-id "$SCHEMA_SERVICE_ID" \
            --api-service-id "$API_SERVICE_ID" \
            --frontend-service-id "$FRONTEND_SERVICE_ID" \
            --surreal-image "$SURREAL_IMAGE" \
            --api-image "$API_IMAGE" \
            --frontend-image "$FRONTEND_IMAGE" \
            --surreal-mode "$SURREAL_MODE" \
            --api-health-url "$API_HEALTH_URL" \
            --frontend-health-url "$FRONTEND_HEALTH_URL" \
            --confirm "PROMOTE $PROJECT_ID/$ENVIRONMENT_ID"
