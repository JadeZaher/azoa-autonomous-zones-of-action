name: CI

# Build and test guard. This remains intentionally separate from release and
# deployment, but includes the SurrealDB-backed integration suite now that
# namespace isolation makes the full suite a meaningful green/red signal.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  dotnet:
    name: .NET build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore azoa.sln

      - name: Build
        run: dotnet build azoa.sln --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test tests/AZOA.WebAPI.Tests/AZOA.WebAPI.Tests.csproj --configuration Release --no-build

      - name: Start SurrealDB
        run: |
          docker run --detach \
            --name azoa-ci-surrealdb \
            --user 0:0 \
            --publish 8000:8000 \
            --env SURREAL_SYNC_DATA=true \
            --volume azoa-ci-surrealdb-data:/data \
            surrealdb/surrealdb:v3.1.4 \
            start --log info --user root --pass root --bind 0.0.0.0:8000 rocksdb:///data/db

          for attempt in {1..30}; do
            if docker exec azoa-ci-surrealdb /surreal is-ready --endpoint http://localhost:8000; then
              exit 0
            fi
            sleep 2
          done

          docker logs azoa-ci-surrealdb
          exit 1

      - name: Integration tests
        run: dotnet test tests/AZOA.WebAPI.IntegrationTests/AZOA.WebAPI.IntegrationTests.csproj --configuration Release --no-build --filter "Category!=Chaos&Category!=Perf"

  sdk:
    name: SDK build + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/azoa-wallet
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
