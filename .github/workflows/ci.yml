name: CI

# Build and test guard. This remains intentionally separate from release and
# deployment, but includes the SurrealDB-backed integration suite now that
# namespace isolation makes the full suite a meaningful green/red signal.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  dotnet:
    name: .NET build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore azoa.sln

      - name: Build
        run: dotnet build azoa.sln --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test tests/AZOA.WebAPI.Tests/AZOA.WebAPI.Tests.csproj --configuration Release --no-build

      - name: Start SurrealDB
        run: |
          docker run --detach \
            --name azoa-ci-surrealdb \
            --user 0:0 \
            --publish 8000:8000 \
            --env SURREAL_SYNC_DATA=true \
            --volume azoa-ci-surrealdb-data:/data \
            surrealdb/surrealdb:v3.1.4 \
            start --log info --user root --pass root --bind 0.0.0.0:8000 rocksdb:///data/db

          for attempt in {1..30}; do
            if docker exec azoa-ci-surrealdb /surreal is-ready --endpoint http://localhost:8000; then
              exit 0
            fi
            sleep 2
          done

          docker logs azoa-ci-surrealdb
          exit 1

      - name: Integration tests
        env:
          AZOA_SURREALDB_CONTAINER_NAME: azoa-ci-surrealdb
        run: dotnet test tests/AZOA.WebAPI.IntegrationTests/AZOA.WebAPI.IntegrationTests.csproj --configuration Release --no-build --filter "Category!=Chaos&Category!=Perf"

      - name: Conformance gate evidence
        env:
          AZOA_CONTAINER_RUNTIME: docker
          AZOA_SURREALDB_CONTAINER_NAME: azoa-ci-surrealdb
          CONFORMANCE_RESULTS: ${{ runner.temp }}/azoa-conformance
        run: |
          mkdir -p "$CONFORMANCE_RESULTS"
          dotnet test tests/AZOA.WebAPI.IntegrationTests/AZOA.WebAPI.IntegrationTests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AZOA.WebAPI.IntegrationTests.Gates.G1_CrashDurabilityTest" --logger "trx;LogFileName=G1.trx" --results-directory "$CONFORMANCE_RESULTS"
          dotnet test tests/AZOA.WebAPI.IntegrationTests/AZOA.WebAPI.IntegrationTests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AZOA.WebAPI.IntegrationTests.Gates.G2_IdempotencyTocTouTest" --logger "trx;LogFileName=G2.trx" --results-directory "$CONFORMANCE_RESULTS"
          dotnet test tests/AZOA.WebAPI.IntegrationTests/AZOA.WebAPI.IntegrationTests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AZOA.WebAPI.IntegrationTests.Gates.G3_InjectionSuiteTest.G3_ControllerPaths_HostileInput_LandsAsLiteralNotSurrealQl|FullyQualifiedName~AZOA.WebAPI.IntegrationTests.Gates.G3_InjectionSuiteTest.G3_DirectWithParam_HostileInput_PersistsAsLiteralString" --logger "trx;LogFileName=G3.trx" --results-directory "$CONFORMANCE_RESULTS"
          dotnet test tests/AZOA.WebAPI.IntegrationTests/AZOA.WebAPI.IntegrationTests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AZOA.WebAPI.IntegrationTests.Gates.G5_RestoreDrillTest" --logger "trx;LogFileName=G5.trx" --results-directory "$CONFORMANCE_RESULTS"
          dotnet test tests/AZOA.WebAPI.IntegrationTests/AZOA.WebAPI.IntegrationTests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AZOA.WebAPI.IntegrationTests.Gates.G7_ReconciliationDrillTest" --logger "trx;LogFileName=G7.trx" --results-directory "$CONFORMANCE_RESULTS"
          python3 - "$CONFORMANCE_RESULTS" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          expected = {
              "G1": "G1_CrashDurabilityTest",
              "G2": "G2_IdempotencyTocTouTest",
              "G3": "G3_InjectionSuiteTest",
              "G5": "G5_RestoreDrillTest",
              "G7": "G7_ReconciliationDrillTest",
          }
          required_methods = {
              "G3": {
                  "AZOA.WebAPI.IntegrationTests.Gates.G3_InjectionSuiteTest.G3_ControllerPaths_HostileInput_LandsAsLiteralNotSurrealQl",
                  "AZOA.WebAPI.IntegrationTests.Gates.G3_InjectionSuiteTest.G3_DirectWithParam_HostileInput_PersistsAsLiteralString",
              },
          }
          directory = Path(sys.argv[1])
          for gate, class_name in expected.items():
              path = directory / f"{gate}.trx"
              results = [element for element in ET.parse(path).iter()
                         if element.tag.rsplit("}", 1)[-1] == "UnitTestResult"]
              prefix = f"AZOA.WebAPI.IntegrationTests.Gates.{class_name}."
              result_names = [result.get("testName", "") for result in results]
              if not results or any(result.get("outcome") != "Passed" or not
                                    result.get("testName", "").startswith(prefix)
                                    for result in results):
                  raise SystemExit(f"Invalid conformance TRX: {path}")
              if gate in required_methods and (set(result_names) != required_methods[gate]
                                               or len(result_names) != len(required_methods[gate])):
                  raise SystemExit(f"Incomplete conformance TRX: {path}")
          PY

      - name: Package conformance gate evidence
        if: success()
        env:
          CONFORMANCE_RESULTS: ${{ runner.temp }}/azoa-conformance
        run: |
          files_json=$(for file in "$CONFORMANCE_RESULTS"/G{1,2,3,5,7}.trx; do
            jq -n --arg name "$(basename "$file")" --arg sha256 "$(sha256sum "$file" | awk '{print $1}')" '{name: $name, sha256: $sha256}'
          done | jq -s .)
          jq -n \
            --arg schema "azoa-node-conformance-evidence/v1" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$GITHUB_SHA" \
            --arg workflow "$GITHUB_WORKFLOW_REF" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg expiresAt "$(date -u -d '+24 hours' +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson files "$files_json" \
            '{schema: $schema, repository: $repository, commit: $commit, workflow: $workflow, runId: $runId, generatedAt: $generatedAt, expiresAt: $expiresAt, files: $files}' \
            > "$CONFORMANCE_RESULTS/metadata.json"
          tar --create --gzip --file "$CONFORMANCE_RESULTS/conformance-evidence.tar.gz" \
            --directory "$CONFORMANCE_RESULTS" metadata.json G1.trx G2.trx G3.trx G5.trx G7.trx

      - name: Attest conformance evidence
        if: success() && github.event_name == 'push'
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/azoa-conformance/conformance-evidence.tar.gz

      - name: Upload conformance evidence bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: azoa-node-conformance-${{ github.sha }}
          path: ${{ runner.temp }}/azoa-conformance/conformance-evidence.tar.gz
          if-no-files-found: error
          retention-days: 30

  sdk:
    name: SDK build + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/azoa-wallet
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
